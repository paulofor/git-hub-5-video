spring:
  datasource:
    url: jdbc:h2:mem:hub-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      initialization-fail-timeout: 0
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false
  liquibase:
    enabled: false
