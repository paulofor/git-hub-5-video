services:
  reverse-proxy:
    image: caddy:2.9-alpine
    container_name: lojas-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - loja-virtual
      - gerenciador-loja-virtual
    networks:
      - lojas-net

  loja-virtual:
    image: ${LOJA_VIRTUAL_IMAGE:-ghcr.io/SEU_USUARIO/loja-virtual:latest}
    container_name: loja-virtual
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - lojas-net

  gerenciador-loja-virtual:
    image: ${GERENCIADOR_IMAGE:-ghcr.io/SEU_USUARIO/gerenciador-loja-virtual:latest}
    container_name: gerenciador-loja-virtual
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
      - "8081"
    networks:
      lojas-net:
        aliases:
          - backend

networks:
  lojas-net:
    name: lojas-net

volumes:
  caddy_data:
  caddy_config:
