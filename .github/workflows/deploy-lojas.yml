name: Deploy lojas + gerenciador

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - "apps/backend/**"
      - "infra/deploy/lojas/**"
      - ".github/workflows/deploy-lojas.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      GHCR_USER: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        include:
          - app_name: loja-virtual
            image_name: loja-virtual
            dockerfile: apps/frontend/Dockerfile
            context: apps/frontend
          - app_name: gerenciador-loja-virtual
            image_name: gerenciador-loja-virtual
            dockerfile: apps/backend/Dockerfile
            context: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USER }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_USER }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ env.GHCR_USER }}/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_USER }}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_USER }}/${{ matrix.image_name }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish
    env:
      DEPLOY_HOST: 177.153.62.107
      DEPLOY_USER: root
      REMOTE_PATH: /opt/lojas
      GHCR_USER: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "SSH_COMMON_ARGS=-i $HOME/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=60" >> "$GITHUB_ENV"

      - name: Preparar diretório remoto
        run: |
          ssh ${SSH_COMMON_ARGS} "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${REMOTE_PATH}"

      - name: Sincronizar arquivos de deploy
        run: |
          rsync -avz --delete -e "ssh ${SSH_COMMON_ARGS}" \
            infra/deploy/lojas/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_PATH}/"

      - name: Login no GHCR na VPS
        run: |
          ssh ${SSH_COMMON_ARGS} "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker login ghcr.io -u '${GHCR_USER}' --password-stdin" <<< "${GHCR_TOKEN}"

      - name: Publicar stack
        env:
          GHCR_USER: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
        run: |
          ssh ${SSH_COMMON_ARGS} "${DEPLOY_USER}@${DEPLOY_HOST}" "\
            set -euo pipefail && \
            cd ${REMOTE_PATH} && \
            export CADDY_EMAIL='${CADDY_EMAIL}' && \
            export LOJA_VIRTUAL_IMAGE='ghcr.io/${GHCR_USER}/loja-virtual:latest' && \
            export GERENCIADOR_IMAGE='ghcr.io/${GHCR_USER}/gerenciador-loja-virtual:latest' && \
            docker compose -f docker-compose.public.yml pull && \
            docker compose -f docker-compose.public.yml up -d \
          "
